<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <title>StreamAI</title>
    <meta
      name="description"
      content="Stream AI is an AI-powered platform that enhances live streaming by analyzing audio, and chat in real time to provide features like captions, summaries, and content moderation. It improves viewer experience, accessibility, and stream safety without changing the original live broadcast."
    />
    <meta
      name="keywords"
      content="StreamAI, AI streaming, live streaming, captions, stream moderation, stream summaries, creator dashboard, livestream analytics, streaming platform"
    />

    <!-- Change these names here -->
    <meta
      name="author"
      content="Azad Gupta, Sarang Shinde, Om Yeole, Omkar Ardekar"
    />
    <meta name="application-name" content="StreamAI" />
    <meta name="generator" content="Vite" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.streamai.in/" />

    <!-- Favicon / App Icons using only logo.png -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StreamAI" />
    <meta property="og:title" content="StreamAI" />
    <meta
      property="og:description"
      content="Stream AI is an AI-powered platform that enhances live streaming by analyzing audio, and chat in real time to provide features like captions, summaries, and content moderation. It improves viewer experience, accessibility, and stream safety without changing the original live broadcast."
    />
    <meta property="og:url" content="https://www.streamai.in/" />
    <meta property="og:image" content="https://www.streamai.in/logo.png" />
    <meta property="og:image:alt" content="StreamAI logo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StreamAI" />
    <meta
      name="twitter:description"
      content="Stream AI is an AI-powered platform that enhances live streaming by analyzing audio, and chat in real time to provide features like captions, summaries, and content moderation. It improves viewer experience, accessibility, and stream safety without changing the original live broadcast."
    />
    <meta name="twitter:image" content="https://www.streamai.in/logo.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "StreamAI",
        "url": "https://www.streamai.in/",
        "description": "Stream AI is an AI-powered platform that enhances live streaming by analyzing audio, and chat in real time to provide features like captions, summaries, and content moderation. It improves viewer experience, accessibility, and stream safety without changing the original live broadcast.",
        "publisher": {
          "@type": "Organization",
          "name": "StreamAI",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.streamai.in/logo.png"
          }
        }
      }
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
